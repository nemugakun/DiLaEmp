    <title>DiLaEmp</title>
    <!--<base href="/" />-->
    <script type="text/javascript">
        // 1. Obtenemos el path actual (ej: /DiLaEmp/ o /)
        var path = window.location.pathname;

        // 2. Creamos el elemento <base> dinámicamente
        var baseElement = document.createElement('base');

        // 3. Si el path contiene el nombre de tu repo, estamos en GitHub
        if (path.includes('/DiLaEmp/')) {
            baseElement.href = '/DiLaEmp/';
        } else {
            baseElement.href = '/';
        }

        // 4. Lo inyectamos en el head
        document.getElementsByTagName('head')[0].appendChild(baseElement);
    </script>
